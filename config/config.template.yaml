# ============================================================================
# NOTES
# ============================================================================
#
# 1. Environment Variables:
#    Use format: ${VARIABLE_NAME}
#    Set before running: export OPENAI_API_KEY="sk-..."
#
# 2. CSS Selectors:
#    Inspect website with browser (F12), find content element
#    Test in browser console: document.querySelectorAll('selector')
#
# 3. Recursive Crawling (full-website scraping):
#    By default, sources use recursive=true with crawl_depth=3:
#    - All links on the same domain are followed
#    - Crawling stops at specified depth level
#    - External links are automatically filtered out
#    - URL deduplication prevents duplicate processing
#    - Rate limiting respects target servers
#    
#    To scrape only a single page:
#      recursive: false
#    
#    To crawl deeper (more pages):
#      crawl_depth: 5  (default is 3)
#    
#    Crawl depth examples:
#    - depth 1: Only root page
#    - depth 2: Root + all links from root
#    - depth 3: Root + links from all level-2 pages + links from level-2 pages
#    
#    Output files:
#    - Each crawled page gets a unique file with URL hash: source_web_abc12345.json
#    - Improves when debugging and analyzing specific pages
#
# 4. Local LLM Setup:
#    - Install: https://ollama.ai/download
#    - Start service: ollama serve
#    - Pull model: ollama pull mistral
#    - In another terminal, run: python main.py --config config.yaml
#
# 5. Rate Limiting:
#    - For recursive crawling, crawl_delay adds delays between requests
#    - Default 0.5 seconds between requests (respectful crawling)
#    - Reduce workers if hitting API rate limits
#    - Use smaller batch_size if getting throttled
#    - Local Ollama has no rate limits
#
# 6. Cost Estimation:
#    - OpenAI: ~$0.50-$1.00 per 1M tokens
#    - Anthropic: ~$3-$60 per 1M tokens
#    - Ollama: Free (local)

# ============================================================================
